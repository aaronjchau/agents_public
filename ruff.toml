target-version = "py312"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
    "TCH",  # flake8-type-checking
    "ASYNC",
]
ignore = [
    "E501",  # line too long — defer to formatter
]

[lint.per-file-ignores]
"tests/**" = ["B011"]  # allow `assert False` in tests

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
