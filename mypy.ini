[mypy]
python_version = 3.12
strict = True
warn_unreachable = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_reexport = True
mypy_path = .
# Scope for bare `mypy` — CI and `make typecheck` both rely on this list,
# so the two entry points always check the same tree.
files = shared,services,scripts,migrations,tests

[mypy-tests.*]
disallow_untyped_defs = False

# google-api-python-client and google-auth ship without py.typed markers.
# Stubs exist (google-api-python-client-stubs) but are incomplete, so
# ignore_missing_imports types these SDK modules as Any.
[mypy-googleapiclient.*]
ignore_missing_imports = True

[mypy-google.oauth2.*]
ignore_missing_imports = True
