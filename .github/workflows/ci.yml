# Public-mirror CI — scripts/sync-public.sh installs this file as the
# mirror's .github/workflows/ci.yml. Keep the python steps in sync with
# workflows/ci.yml (the private workflow); the site job is mirror-only.
# Lives outside .github/workflows/ so pushing it does not require the
# OAuth `workflow` scope.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python — lint, type, test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies (frozen lockfile)
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      - name: Test (pytest)
        run: uv run pytest -q

  site:
    name: Site — lint, type, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: site

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check (tsc --noEmit)
        run: npm run typecheck

      - name: Build (next build)
        run: npm run build

  audit:
    name: Audit — dependency vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      # No requirements.txt in-repo: bridge the uv lockfile into one pip-audit can read.
      # --require-hashes --disable-pip audits offline against the pinned hashes (no resolver).
      # Non-blocking: the mirror's lockfile is synced from the private repo, not maintained here.
      - name: Audit Python deps (pip-audit)
        continue-on-error: true
        run: |
          uv export --frozen --no-emit-project --format requirements.txt -o /tmp/req.txt
          uvx pip-audit -r /tmp/req.txt --require-hashes --disable-pip
